[project]
name = "hey"
version = "0.1.0"
description = ""
readme = "README.md"
authors = [
    { name = "altescy", email = "me@altescy.jp" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "openai>=1.77.0",
    "pydantic>=2.11.4",
    "pyyaml>=6.0.2",
    "rich>=14.0.0",
    "sqlmodel>=0.0.24",
]

[dependency-groups]
dev = [
    "pyright>=1.1.400",
    "pytest>=8.3.5",
    "ruff>=0.11.8",
]

[build-system]
requires = ['hatchling', 'hatch-fancy-pypi-readme>=22.5.0']
build-backend = 'hatchling.build'

[tool.hatch.version]
path = 'hey/__init__.py'

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.sdist]
include = [
    '/README.md',
    '/hey',
]

[tool.ruff]
line-length = 120
